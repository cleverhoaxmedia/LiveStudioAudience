  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

font-display: swap;\n  src: url(\"7ced936e-736e-4063-be26-19a985991ad8\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"df757dc1-40b6-4a56-8c86-e3cf0c4b0491\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"7ced936e-736e-4063-be26-19a985991ad8\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"df757dc1-40b6-4a56-8c86-e3cf0c4b0491\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <script src=\"67903f2f-1972-4000-9103-c14f0485d598\"><\u002Fscript>\n  <script src=\"b4febd02-78e0-401e-bc3a-a7cb0d742012\"><\u002Fscript>\n\n  \n\n  <style>\n    :root {\n      --bg:         #080808;\n      --surface:    #1c1212;\n      --border:     #2e1f1f;\n      --yay:        #FFE135;\n      --yay-dim:    #7a6a18;\n      --boo:        #FF3B30;\n      --boo-dim:    #7a1c18;\n      --text:       #F0EEE9;\n      --muted:      #7a6a65;\n      --gold:       #FFE135;\n      --ff-display: 'Bebas Neue', sans-serif;\n      --ff-body:    'DM Sans', sans-serif;\n    }\n\n    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n    html, body {\n      height: 100%;\n      font-family: var(--ff-body);\n      background: var(--bg);\n      color: var(--text);\n      overflow: hidden;\n    }\n\n    body::before {\n      content: '';\n      position: fixed; inset: 0;\n      background:\n        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(139,26,26,0.18) 0%, transparent 70%),\n        repeating-linear-gradient(90deg, transparent 0px, transparent 38px, rgba(255,255,255,0.015) 38px, rgba(255,255,255,0.015) 40px);\n      pointer-events: none; z-index: 0;\n    }\n\n    /* ── VIEWS */\n    .view {\n      display: none; flex-direction: column; align-items: center; justify-content: center;\n      height: 100dvh; padding: 2rem 1.5rem; gap: 1.25rem; text-align: center;\n      position: relative; z-index: 1; overflow-y: auto;\n    }\n    .view.active { display: flex; }\n\n    /* ── TYPE */\n    .display { font-family: var(--ff-display); font-size: clamp(3rem, 12vw, 5.5rem); line-height: 0.95; }\n    .display em { font-style: normal; color: var(--gold); }\n    .sub { font-size: 0.9rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }\n    .brand-label { font-family: var(--ff-body); font-size: 1.1rem; font-weight: 700; color: var(--text); letter-spacing: 0.08em; opacity: 0.75; }\n    .divider { width: 48px; height: 2px; background: var(--border); border-radius: 2px; margin: 0.25rem auto; }\n\n    .spotlight {\n      width: 180px; height: 180px; border-radius: 50%;\n      background: radial-gradient(circle, rgba(245,200,66,0.12) 0%, transparent 70%);\n      position: absolute; top: -30px; left: 50%; transform: translateX(-50%);\n      pointer-events: none;\n    }\n\n    /* ── HOME BUTTONS */\n    .btn {\n      display: flex; align-items: center; justify-content: center; gap: 0.6rem;\n      border: none; border-radius: 0.9rem; cursor: pointer;\n      font-family: var(--ff-body); font-weight: 700; font-size: 1.05rem;\n      padding: 1rem 1.5rem; width: 100%; max-width: 340px;\n      transition: transform 0.12s, box-shadow 0.12s; letter-spacing: 0.02em;\n    }\n    .btn:active { transform: scale(0.96); }\n    .btn-audience { background: var(--yay); color: #1a0e00; font-size: 1.2rem; padding: 1.15rem 1.5rem; }\n    .btn-audience:hover { opacity: 0.92; }\n    .btn-backstage { background: transparent; color: var(--muted); border: 1px solid var(--border); font-size: 0.9rem; }\n    .btn-backstage:hover { border-color: var(--muted); color: var(--text); }\n\n    /* ── VOTE BUTTONS */\n    .vote-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; width: 100%; max-width: 360px; }\n\n    .vote-btn {\n      border: none; border-radius: 1.5rem; cursor: pointer;\n      display: flex; flex-direction: column; align-items: center; justify-content: center;\n      gap: 0.4rem; padding: 2rem 1rem; height: 170px;\n      transition: transform 0.12s, opacity 0.3s, filter 0.3s, box-shadow 0.3s;\n      position: relative; overflow: visible;\n    }\n    .vote-btn:active { transform: scale(0.93); }\n    .vote-btn-yay { background: linear-gradient(160deg, #FFE135 0%, #C9A84C 100%); }\n    .vote-btn-boo { background: linear-gradient(160deg, #FF3B30 0%, #991f1a 100%); }\n\n    .vote-btn .icon  { font-size: 3.2rem; line-height: 1; }\n    .vote-btn .label { font-family: var(--ff-display); font-size: 1.4rem; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }\n    .vote-btn-yay .label { color: #1a0e00; text-shadow: none; }\n\n    .vote-btn.selected { box-shadow: 0 0 0 3px #fff; }\n    .vote-btn.dimmed   { opacity: 0.3; filter: saturate(0.3); transform: scale(0.96); }\n\n    .vote-hint { font-size: 0.8rem; color: var(--muted); min-height: 1.3rem; transition: opacity 0.3s; }\n\n    /* ── PARTICLES */\n    .particle {\n      position: fixed; pointer-events: none; z-index: 999;\n      font-size: 1.6rem; line s=\"meter-title\">LiveStudioAudience<\u002Fh2>\n  <\u002Fdiv>\n\n  <div class=\"alert-banner\" id=\"alert-banner\"><\u002Fdiv>\n\n  <div class=\"scores\">\n    <div class=\"score-card yay\" id=\"card-yay\">\n      <span class=\"icon\">👍<\u002Fspan>\n      <span class=\"num\" id=\"yay-count\">0<\u002Fspan>\n      <span class=\"tag\">Yay!<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"score-card boo\" id=\"card-boo\">\n      <span class=\"icon\">👎<\u002Fspan>\n      <span class=\"num\" id=\"boo-count\">0<\u002Fspan>\n      <span class=\"tag\">Boo!<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"bar-wrap\">\n    <div class=\"bar-labels\"><span>👍 Yay<\u002Fspan><span>Boo 👎<\u002Fspan><\u002Fdiv>\n    <div class=\"bar-track\"><div class=\"bar-fill\" id=\"bar-fill\" style=\"width:50%\"><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"meter-controls\">\n    <div class=\"performer-row\">\n      <input class=\"performer-input\" id=\"performer-input\" type=\"text\" placeholder=\"Performer name…\" oninput=\"setPerformerName(this.value)\" maxlength=\"40\">\n      <button class=\"btn-reset\" onclick=\"resetVotes()\">Reset<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"audience-row\">\n      <span class=\"audience-label\">Audience size:<\u002Fspan>\n      <input class=\"audience-input\" id=\"audience-input\" type=\"number\" min=\"1\" placeholder=\"e.g. 80\" oninput=\"setAudienceSize(this.value)\">\n      <span class=\"threshold-info\" id=\"threshold-info\">set size to enable alert<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <button class=\"btn-changepw\" onclick=\"openChangePwModal()\">🔑 Change Password<\u002Fbutton>\n<\u002Fdiv>\n\n<!-- ══ CHANGE PASSWORD MODAL ═══════════════════════════════════════ -->\n<div class=\"modal-bg\" id=\"changepw-modal-bg\">\n  <div class=\"modal\">\n    <div class=\"modal-icon\">🔑<\u002Fdiv>\n    <h3>Change Password<\u002Fh3>\n    <p>Enter and confirm your new backstage password<\u002Fp>\n    <input class=\"modal-input\" id=\"new-pw-input\" type=\"password\" placeholder=\"New password\">\n    <input class=\"modal-input\" id=\"confirm-pw-input\" type=\"password\" placeholder=\"Confirm password\" onkeydown=\"if(event.key==='Enter') changePassword()\">\n    <p class=\"modal-error\" id=\"changepw-error\"><\u002Fp>\n    <button class=\"btn-enter\" onclick=\"changePassword()\">Update Password<\u002Fbutton>\n    <button class=\"btn-cancel\" onclick=\"closeChangePwModal()\">Cancel<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══ PASSWORD MODAL ══════════════════════════════════════════════ -->\n<div class=\"modal-bg\" id=\"modal-bg\">\n  <div class=\"modal\">\n    <div class=\"modal-icon\">🔐<\u002Fdiv>\n    <h3>Backstage<\u002Fh3>\n    <p>For show operators only<\u002Fp>\n    <input class=\"modal-input\" id=\"pw-input\" type=\"password\" placeholder=\"••••••\" onkeydown=\"if(event.key==='Enter') submitPassword()\">\n    <p class=\"modal-error\" id=\"pw-error\"><\u002Fp>\n    <button class=\"btn-enter\" onclick=\"submitPassword()\">Enter<\u002Fbutton>\n    <button class=\"btn-cancel\" onclick=\"closeModal()\">Cancel<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<script>\n// ================================================================\n//  ★  CONFIG — edit before deploying  ★\n// ================================================================\nconst FIREBASE_CONFIG = {\n  apiKey:            \"AIzaSyBYZXeBivsWQm7kHRXOIhaTTnEK8IdNCTc\",\n  authDomain:        \"comedometer.firebaseapp.com\",\n  databaseURL:       \"https://comedometer-default-rtdb.firebaseio.com\",\n  projectId:         \"comedometer\",\n  storageBucket:     \"comedometer.firebasestorage.app\",\n  messagingSenderId: \"822686569264\",\n  appId:             \"1:822686569264:web:3bbb555ad0357dab8deef5\"\n};\n\n// ================================================================\n\nfirebase.initializeApp(FIREBASE_CONFIG);\nconst db          = firebase.database();\nconst votesRef    = db.ref('votes');\nconst nameRef     = db.ref('performerName');\nconst audienceRef = db.ref('audienceSize');\nconst roundRef    = db.ref('round');\nconst pwHashRef   = db.ref('config/pwHash');\n\n// ── NAV ──────────────────────────────────────────────────────────\nlet meterActive    = false;\nlet audienceActive = false;\n\nfunction showView(id) {\n  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));\n  document.getElementById(id).classList.add('active');\n}\nfunction showHome()     { showView('view-home'); }\nfunction showAudience() { showView('view-audience'); startAudienceListener(); }\nfunction showMeter()    { showView('view-meter');   startMeterListener(); }\n\n// ── CRYPTO ───────────────────────────────────────────────────────\nasync function sha256(str) {\n  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));\n  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');\n}\n\n// ── PASSWORD ─────────────────────────────────────────────────────\nfunction openPasswordModal() {\n  document.getElementById('modal-bg').classList.add('open');\n  document.getElementById('pw-input').value = '';\n  document.getElementById('pw-error').textContent = '';\n  setTimeout(() => document.getElementById('pw-input').focus(), 120);\n}\nfunction closeModal() { document.getElementById('modal-bg').classList.remove('open'); }\nasync function submitPassword() {\n  const val = document.getElementById('pw-input').value;\n  if (!val) return;\n  const inputHash  = await sha256(val);\n  const snap       = await pwHashRef.once('value');\n  const storedHash = snap.val();\n  if (inputHash === storedHash) {\n    closeModal();\n    showMeter();\n  } else {\n    document.getElementById('pw-error').textContent = 'Wrong password — try again.';\n    document.getElementById('pw-input').value = '';\n    document.getElementById('pw-input').focus();\n  }\n}\n\n// ── CHANGE PASSWORD ───────────────────────────────────────────────\nfunction openChangePwModal() {\n  document.getElementById('changepw-modal-bg').classList.add('open');\n  document.getElementById('new-pw-input').value = '';\n  document.getElementById('confirm-pw-input').value = '';\n  document.getElementById('changepw-error').textContent = '';\n  setTimeout(() => document.getElementById('new-pw-input').focus(), 120);\n}\nfunction closeChangePwModal() {\n  document.getElementById('changepw-modal-bg').classList.remove('open');\n}\nasync function changePassword() {\n  const newPw     = document.getElementById('new-pw-input').value;\n  const confirmPw = document.getElementById('confirm-pw-input').value;\n  const errEl     = document.getElementById('changepw-error');\n  if (!newPw)              { errEl.textContent = 'Please enter a new password.'; return; }\n  if (newPw.length < 4)   { errEl.textContent = 'Password must be at least 4 characters.'; return; }\n  if (newPw !== confirmPw) { errEl.textContent = \"Passwords don't match.\"; return; }\n  const hash = await sha256(newPw);\n  await pwHashRef.set(hash);\n  closeChangePwModal();\n  showToast('✅ Password updated!');\n}\n\n// ── VOTE STORAGE (round-aware) ────────────────────────────────────\nlet cachedRound  = 0;\nconst VOTE_KEY   = 'improv_vote';\nconst YAY_POOL   = ['👍','😄','🎉','⭐','😁','✨','🌟'];\nconst BOO_POOL   = ['👎','😤','😴','💤','😒','🥱','😑'];\n\nfunction getMyVote() {\n  try { return JSON.parse(localStorage.getItem(VOTE_KEY)); } catch { return null; }\n}\nfunction saveMyVote(type, round) {\n  if (type) localStorage.setItem(VOTE_KEY, JSON.stringify({ vote: type, round }));\n  else       localStorage.removeItem(VOTE_KEY);\n}\n\n// ── AUDIENCE LISTENER ────────────────────────────────────────────\nfunction startAudienceListener() {\n  if (audienceActive) return;\n  audienceActive = true;\n\n  nameRef.on('value', snap => {\n    const name = snap.val() || '';\n    const el = document.getElementById('audience-label');\n    el.innerHTML = name.trim()\n      ? `How's <em>${escHtml(name.trim())}<\u002Fem> doing?`\n      : 'What do you think?';\n  });\n\n  // Watch the round — clear stale votes automatically\n  roundRef.on('value', snap => {\n    cachedRound = snap.val() || 0;\n    const saved = getMyVote();\n    if (saved && saved.round !== cachedRound) saveMyVote(null);\n    refreshVoteUI();\n  });\n\n  document.getElementById('audience-status').classList.add('live');\n}\n\nfunction refreshVoteUI() {\n  const saved  = getMyVote();\n  const prev   = saved ? saved.vote : null;\n  const yayBtn = document.getElementById('btn-yay');\n  const booBtn = document.getElementById('btn-boo');\n  const hint   = document.getElementById('vote-hint');\n\n  yayBtn.classList.remove('selected', 'dimmed');\n  booBtn.classList.remove('selected', 'dimmed');\n\n  if (prev === 'yay') {\n    yayBtn.classList.add('selected');\n    booBtn.classList.add('dimmed');\n    hint.textContent = 'Tap again to clear, or switch your vote.';\n  } else if (prev === 'boo') {\n    booBtn.classList.add('selected');\n    yayBtn.classList.add('dimmed');\n    hint.textContent = 'Tap again to clear, or switch your vote.';\n  } else {\n    hint.textContent = '';\n  }\n}\n\n// ── CASTING VOTES ────────────────────────────────────────────────\nfunction castVote(type, event) {\n  const px = event.clientX, py = event.clientY;\n  const saved = getMyVote();\n  const prev  = (saved && saved.round === cachedRound) ? saved.vote : null;\n\n  if (prev === type) {\n    votesRef.update({ [type]: firebase.database.ServerValue.increment(-1) })\n      .catch(() => showToast('⚠️ Connection error'));\n    saveMyVote(null);\n  } else {\n    const updates = {};\n    if (prev) updates[prev] = firebase.database.ServerValue.increment(-1);\n    updates[type] = firebase.database.ServerValue.increment(1);\n    votesRef.update(updates).catch(() => showToast('⚠️ Connection error'));\n    saveMyVote(type, cachedRound);\n    spawnParticles(px, py, type);\n  }\n  refreshVoteUI();\n}\n\n// ── PARTICLES ────────────────────────────────────────────────────\nfunction spawnParticles(x, y, type) {\n  const pool = type === 'yay' ? YAY_POOL : BOO_POOL;\n\n  for (let i = 0; i < 12; i++) {\n    const el = document.createElement('span');\n    el.className = 'particle';\n    el.textContent = pool[Math.floor(Math.random() * pool.length)];\n\n    const angle = (Math.random() * 280) - 140;\n    const dist  = 70 + Math.random() * 130;\n    const rad   = (angle - 90) * Math.PI / 180;\n    const dx    = Math.cos(rad) * dist;\n    const dy    = Math.sin(rad) * dist;\n    const dr    = (Math.random() - 0.5) * 400;\n    const delay = Math.random() * 0.12;\n    const dur   = 0.65 + Math.random() * 0.45;\n    const size  = 1.1 + Math.random() * 1.0;\n\n    el.style.cssText = `\n      left: ${x}px; top: ${y}px;\n      --dx: ${dx}px; --dy: ${dy}px; --dr: ${dr}deg;\n      --dur: ${dur}s; --delay: ${delay}s;\n      font-size: ${size}rem;\n      animation-delay: ${delay}s;\n      animation-duration: ${dur}s;\n    `;\n    document.body.appendChild(el);\n    setTimeout(() => el.remove(), (delay + dur) * 1000 + 100);\n  }\n}\n\n// ── METER LISTENER ────────────────────────────────────────────────\nlet liveYay = 0, liveBoo = 0, liveAudienceSize = 0;\nlet lastAlertState = null;\n\nfunction startMeterListener() {\n  if (meterActive) return;\n  meterActive = true;\n\n  votesRef.on('value', snap => {\n    const data = snap.val() || {};\n    liveYay = Math.max(0, data.yay || 0);\n    liveBoo = Math.max(0, data.boo || 0);\n\n    updateCount('yay-count', 'card-yay', liveYay);\n    updateCount('boo-count', 'card-boo', liveBoo);\n\n    const total = liveYay + liveBoo;\n    const pct   = total === 0 ? 50 : Math.round(liveYay / total * 100);\n    document.getElementById('bar-fill').style.width = pct + '%';\n    document.getElementById('meter-status').classList.add('live');\n    checkAlert();\n  });\n\n  audienceRef.on('value', snap => {\n    liveAudienceSize = Math.max(0, snap.val() || 0);\n    const inp = document.getElementById('audience-input');\n    if (document.activeElement !== inp) inp.value = liveAudienceSize || '';\n    updateThresholdInfo(liveAudienceSize);\n    checkAlert();\n  });\n\n  nameRef.on('value', snap => {\n    const inp = document.getElementById('performer-input');\n    if (document.activeElement !== inp) inp.value = snap.val() || '';\n  });\n}\n\nfunction updateCount(numId, cardId, val) {\n  const el   = document.getElementById(numId);\n  const card = document.getElementById(cardId);\n  if (el.textContent !== String(val)) {\n    el.textContent = val;\n    card.classList.remove('pulse');\n    void card.offsetWidth;\n    card.classList.add('pulse');\n    setTimeout(() => card.classList.remove('pulse'), 400);\n  }\n}\n\nfunction updateThresholdInfo(size) {\n  const el = document.getElementById('threshold-info');\n  if (!size) { el.innerHTML = 'set size to enable alert'; return; }\n  const n = Math.ceil(size * 0.25);\n  el.innerHTML = `alert fires at <strong>${n} votes<\u002Fstrong> (25%)`;\n}\n\n// ── ALERT BANNER ─────────────────────────────────────────────────\nfunction checkAlert() {\n  const banner = document.getElementById('alert-banner');\n  if (!liveAudienceSize) {\n    banner.className = 'alert-banner';\n    lastAlertState = null;\n    return;\n  }\n  const trigger = Math.ceil(liveAudienceSize * 0.25);\n  const yayHit  = liveYay >= trigger;\n  const booHit  = liveBoo >= trigger;\n\n  if (yayHit && (!booHit || liveYay >= liveBoo)) {\n    if (lastAlertState !== 'love') {\n      lastAlertState = 'love';\n      banner.textContent = \"🎉 They Love 'Em!\";\n      banner.className = 'alert-banner love show';\n    }\n  } else if (booHit) {\n    if (lastAlertState !== 'boo') {\n      lastAlertState = 'boo';\n      banner.textContent = \"😤 Get 'Em Off the Stage!\";\n      banner.className = 'alert-banner boo-alert show';\n    }\n  } else {\n    banner.className = 'alert-banner';\n    lastAlertState = null;\n  }\n}\n\n// ── CONTROLS ─────────────────────────────────────────────────────\nfunction resetVotes() {\n  if (!confirm('Reset all vote counts to zero?')) return;\n  votesRef.set({ yay: 0, boo: 0 });\n  roundRef.set(firebase.database.ServerValue.increment(1)); // invalidates all stored votes\n  lastAlertState = null;\n  document.getElementById('alert-banner').className = 'alert-banner';\n}\nfunction setPerformerName(val) { nameRef.set(val.trim() || null); }\nfunction setAudienceSize(val)  {\n  const n = parseInt(val);\n  audienceRef.set(n > 0 ? n : null);\n}\n\n// ── UTILS ─────────────────────────────────────────────────────────\nfunction showToast(msg) {\n  const t = document.getElementById('toast');\n  t.textContent = msg;\n  t.classList.add('show');\n  setTimeout(() => t.classList.remove('show'), 2500);\n}\nfunction escHtml(s) {\n  return s.replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;');\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
